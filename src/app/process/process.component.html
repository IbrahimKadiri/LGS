<section class="bg-[#060606] py-24">
  <div class="max-w-7xl mx-auto px-6">

    <!-- Intro -->
    <div class="process-header max-w-3xl mx-auto text-center mb-12">
      <div class="text-[#8a7d6a] uppercase text-sm tracking-widest mb-2">Notre process</div>
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-light text-[#f0ede8] mb-4">
        Simple, rapide et sans surprise
      </h2>
      <p class="text-[#9a9088] text-base sm:text-lg italic">
        Un accompagnement fluide, clair et structuré à chaque étape de votre projet.
      </p>
    </div>

    <!-- Étapes -->
    <div class="flex flex-col gap-12 sm:gap-16 relative">
      <ng-container *ngFor="let step of steps; let i = index">
        <div class="flex flex-col sm:flex-row gap-6 sm:gap-8 items-start process-step">

          <!-- Numéro + ligne verticale -->
          <div class="flex flex-col items-center sm:items-start sm:w-16 relative z-10">
            <div class="text-[#8a7d6a] text-xs font-semibold tracking-widest">{{ step.id | number:'2.0' }}</div>
            <div *ngIf="i < steps.length - 1" class="w-px h-5 sm:h-24 bg-[#1a1a1a] mt-2 vertical-line"></div>
          </div>

          <!-- Contenu étape -->
          <div class="flex-1">
            <h3 class="text-2xl sm:text-2xl text-[#f0ede8] font-light mb-2 leading-snug">{{ step.title }}</h3>
            <p class="text-[#9a9088] text-sm sm:text-base leading-relaxed">{{ step.description }}</p>

            <div *ngIf="i < steps.length - 1" class="border-b border-[#1a1a1a] mt-6 sm:mt-8 horizontal-line"></div>
          </div>

        </div>
      </ng-container>
    </div>
  </div>
</section>
