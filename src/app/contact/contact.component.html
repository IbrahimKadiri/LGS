<!-- Contact-->
<section class="bg-[#0d0d0d] py-24 contact-section">
  <div class="max-w-7xl mx-auto px-6">

    <!-- Intro -->
    <div class="max-w-2xl mb-16 contact-header">
      <div class="text-[#8a7d6a] uppercase text-sm tracking-widest mb-2">
        Contact
      </div>

      <h2 class="text-3xl sm:text-4xl md:text-5xl font-light text-[#f0ede8] mb-6 leading-tight">
        Parlons de<br>votre événement
      </h2>

      <p class="text-[#9a9088] text-base sm:text-lg italic">
        Un besoin précis ou une urgence ? Notre équipe vous répond rapidement.
      </p>
    </div>

    <!-- Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20">

      <!-- INFOS -->
      <div class="space-y-8 contact-infos">

        <div>
          <div class="text-[#8a7d6a] text-xs uppercase tracking-widest mb-2">Téléphone</div>
          <div class="text-[#c0b8b0] text-base">+32 2 000 00 00</div>
        </div>

        <div>
          <div class="text-[#8a7d6a] text-xs uppercase tracking-widest mb-2">Email</div>
          <a href="mailto:contact@lgs-events.be"
             class="text-[#c0b8b0] text-base hover:text-[#8a7d6a] transition">
            contact&#64;lgs-events.be
          </a>
        </div>

        <div>
          <div class="text-[#8a7d6a] text-xs uppercase tracking-widest mb-2">Adresse</div>
          <div class="text-[#c0b8b0] text-base">
            Avenue Louise 200<br>1050 Bruxelles
          </div>
        </div>

        <div>
          <div class="text-[#8a7d6a] text-xs uppercase tracking-widest mb-2">Disponibilité</div>
          <div class="text-[#c0b8b0] text-base">
            Lun – Ven, 9h – 18h<br>Urgences 7j/7
          </div>
        </div>

      </div>

      <!-- FORMULAIRE -->
      <form class="flex flex-col gap-6 contact-form">

        <!-- Nom + Société -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <input type="text" placeholder="Nom"
            class="input-style">
          <input type="text" placeholder="Société"
            class="input-style">
        </div>

        <!-- Email + Téléphone -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <input type="email" placeholder="Email professionnel"
            class="input-style">
          <input type="text" placeholder="Téléphone"
            class="input-style">
        </div>

        <!-- Type + Nb personnes -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <select class="input-style">
            <option>Type d'événement</option>
            <option>Corporate</option>
            <option>Mariage</option>
            <option>Gala</option>
            <option>Privé</option>
          </select>

          <input type="text" placeholder="Nombre de personnes"
            class="input-style">
        </div>

        <!-- Date + Lieu -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <input type="text" placeholder="Date prévue"
            class="input-style">
          <input type="text" placeholder="Lieu"
            class="input-style">
        </div>

        <!-- Message -->
        <textarea placeholder="Décrivez votre besoin..."
          class="input-style h-28 resize-none"></textarea>

        <!-- CTA -->
        <button type="submit"
          class="rounded-lg border border-white bg-[#0a0a0a] px-10 py-3 font-meduim uppercase text-white text-center hover:bg-gray-200 hover:text-black focus:bg-gray-200 focus:text-black
          active:bg-gray-200 active:text-black">
          Envoyer la demande
        </button>

        <!-- WhatsApp -->
        <div class="flex items-center gap-3 mt-2 cursor-pointer group">
          <div class="w-2 h-2 bg-green-500 rounded-full"></div>
          <div class="text-[#6a6058] text-xs tracking-widest uppercase group-hover:text-[#8a7d6a] transition">
            Contacter via WhatsApp
          </div>
        </div>

      </form>

    </div>

  </div>
</section>
